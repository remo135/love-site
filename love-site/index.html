<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}


#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

input {
    padding: 10px;
    font-size: 18px;
    margin-top: 15px;
    border-radius: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 18px;
    background: #ff1744;
    color: white;
    border: none;
    border-radius: 10px;
}


#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("photo1.jpg") center/cover no-repeat;
    filter: brightness(0.6);
}


.heart {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    color: red;

    animation: heartbeat 1s infinite, glow 1.5s infinite alternate;
}


.letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: white;
    font-weight: bold;
}


.text {
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 25px;
    color: white;
}


@keyframes heartbeat {
    0% { transform: translate(-50%, -50%) scale(1); }
    25% { transform: translate(-50%, -50%) scale(1.2); }
    50% { transform: translate(-50%, -50%) scale(1); }
    75% { transform: translate(-50%, -50%) scale(1.3); }
    100% { transform: translate(-50%, -50%) scale(1); }
}


@keyframes glow {
    from {
        text-shadow: 0 0 10px red, 0 0 20px red;
    }
    to {
        text-shadow: 0 0 25px #ff4d4d, 0 0 40px #ff4d4d;
    }
}
</style>

</head>
<body>


<div id="lockScreen">
    <h2>خمني خمني 🎂</h2>
    <input type="password" id="password" placeholder="DDMMYY">
    <button onclick="checkPassword()">Open ❤️</button>
</div>

<!-- الخلفية -->
<div id="bg"></div>

<!-- القلب -->
<div class="heart">❤</div>
<div class="letter">J</div>
<div class="text">I Love You ❤️</div>

<script>

const correctPassword = "281311";

function checkPassword() {
    const input = document.getElementById("password").value;

    if (input === correctPassword) {
        document.getElementById("lockScreen").style.display = "none";
    } else {
        alert("غلط يا ذكية 😢");
    }
}
</script>

</body>
</html>
